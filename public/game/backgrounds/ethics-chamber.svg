<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <pattern id="stoneWall" width="80" height="50" patternUnits="userSpaceOnUse">
      <rect width="80" height="50" fill="#1a0d00"/>
      <rect x="2" y="2" width="76" height="21" rx="1" fill="#1f1000" stroke="#160b00" stroke-width="1"/>
      <rect x="2" y="27" width="36" height="21" rx="1" fill="#1e0f00" stroke="#160b00" stroke-width="1"/>
      <rect x="42" y="27" width="36" height="21" rx="1" fill="#1f1000" stroke="#160b00" stroke-width="1"/>
    </pattern>
    <pattern id="marbleFloor" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#0f0800"/>
      <rect x="0" y="0" width="100" height="100" fill="none" stroke="#1a1000" stroke-width="2"/>
      <line x1="0" y1="0" x2="100" y2="100" stroke="#120900" stroke-width="0.5" opacity="0.3"/>
      <line x1="100" y1="0" x2="0" y2="100" stroke="#120900" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <radialGradient id="oracleGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FF8C00" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#FF4500" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="crystalBall" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffe8c0" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#ffaa40" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#c85000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5a2000" stop-opacity="0.8"/>
    </radialGradient>
    <radialGradient id="crystalSheen" cx="30%" cy="25%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pillarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a0d00"/>
      <stop offset="30%" stop-color="#2d1800"/>
      <stop offset="70%" stop-color="#2a1500"/>
      <stop offset="100%" stop-color="#1a0d00"/>
    </linearGradient>
    <linearGradient id="scrollGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4a832"/>
      <stop offset="50%" stop-color="#b8921e"/>
      <stop offset="100%" stop-color="#8a6a10"/>
    </linearGradient>
    <filter id="fireGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Torch flame gradient -->
    <radialGradient id="flameGrad" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#FFE135" stop-opacity="1"/>
      <stop offset="40%" stop-color="#FF8C00" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- === WALL & FLOOR === -->
  <rect width="900" height="330" fill="url(#stoneWall)"/>
  <rect y="330" width="900" height="170" fill="url(#marbleFloor)"/>
  <!-- Stone skirting board -->
  <rect y="326" width="900" height="6" fill="#2d1800" stroke="#1a0d00" stroke-width="1"/>

  <!-- === CEILING ARCH === -->
  <path d="M 0,0 Q 450,-50 900,0 L 900,60 Q 450,30 0,60 Z" fill="#1a0d00" opacity="0.5"/>
  <path d="M 100,0 Q 450,-30 800,0" fill="none" stroke="#2d1800" stroke-width="2" opacity="0.4"/>

  <!-- === STONE PILLARS === -->
  <!-- Left pillar -->
  <rect x="0" y="0" width="85" height="330" fill="url(#pillarGrad)"/>
  <rect x="0" y="0" width="6" height="330" fill="#3d2000"/>
  <rect x="79" y="0" width="6" height="330" fill="#0f0600"/>
  <!-- Pillar decorations -->
  <rect x="5" y="30" width="74" height="8" rx="2" fill="#2d1800"/>
  <rect x="5" y="290" width="74" height="8" rx="2" fill="#2d1800"/>
  <line x1="42" y1="40" x2="42" y2="288" stroke="#2a1500" stroke-width="2" opacity="0.5"/>
  <!-- Carved symbol on pillar -->
  <text x="42" y="180" text-anchor="middle" font-family="serif" font-size="24" fill="#5a3000" opacity="0.6">⚖</text>

  <!-- Right pillar -->
  <rect x="815" y="0" width="85" height="330" fill="url(#pillarGrad)"/>
  <rect x="815" y="0" width="6" height="330" fill="#3d2000"/>
  <rect x="894" y="0" width="6" height="330" fill="#0f0600"/>
  <rect x="820" y="30" width="74" height="8" rx="2" fill="#2d1800"/>
  <rect x="820" y="290" width="74" height="8" rx="2" fill="#2d1800"/>
  <line x1="857" y1="40" x2="857" y2="288" stroke="#2a1500" stroke-width="2" opacity="0.5"/>
  <text x="857" y="180" text-anchor="middle" font-family="serif" font-size="24" fill="#5a3000" opacity="0.6">🔮</text>

  <!-- === WALL TAPESTRIES === -->
  <!-- Left tapestry -->
  <rect x="110" y="20" width="100" height="180" rx="4" fill="#2a1200" stroke="#5a3000" stroke-width="2"/>
  <rect x="115" y="25" width="90" height="170" fill="#1e0d00"/>
  <!-- Tapestry: scales of justice -->
  <text x="160" y="80" text-anchor="middle" font-size="30" fill="#d4a832" opacity="0.7">⚖️</text>
  <text x="160" y="120" text-anchor="middle" font-family="serif" font-size="9" fill="#d4a832" opacity="0.6">FAIRNESS</text>
  <text x="160" y="135" text-anchor="middle" font-family="serif" font-size="9" fill="#d4a832" opacity="0.6">IN KI</text>
  <!-- Tapestry border pattern -->
  <rect x="115" y="25" width="90" height="170" fill="none" stroke="#5a3000" stroke-width="3"/>
  <rect x="118" y="28" width="84" height="164" fill="none" stroke="#3a1800" stroke-width="1"/>
  <!-- Fringe at bottom -->
  <line x1="115" y1="195" x2="115" y2="210" stroke="#d4a832" stroke-width="2" opacity="0.5"/>
  <line x1="122" y1="195" x2="122" y2="208" stroke="#d4a832" stroke-width="2" opacity="0.5"/>
  <line x1="129" y1="195" x2="129" y2="212" stroke="#d4a832" stroke-width="2" opacity="0.5"/>
  <line x1="136" y1="195" x2="136" y2="207" stroke="#d4a832" stroke-width="2" opacity="0.5"/>
  <line x1="143" y1="195" x2="143" y2="210" stroke="#d4a832" stroke-width="2" opacity="0.5"/>
  <line x1="150" y1="195" x2="150" y2="208" stroke="#d4a832" stroke-width="2" opacity="0.5"/>
  <line x1="157" y1="195" x2="157" y2="211" stroke="#d4a832" stroke-width="2" opacity="0.5"/>
  <line x1="164" y1="195" x2="164" y2="207" stroke="#d4a832" stroke-width="2" opacity="0.5"/>
  <line x1="171" y1="195" x2="171" y2="209" stroke="#d4a832" stroke-width="2" opacity="0.5"/>
  <line x1="178" y1="195" x2="178" y2="208" stroke="#d4a832" stroke-width="2" opacity="0.5"/>
  <line x1="185" y1="195" x2="185" y2="210" stroke="#d4a832" stroke-width="2" opacity="0.5"/>
  <line x1="192" y1="195" x2="192" y2="207" stroke="#d4a832" stroke-width="2" opacity="0.5"/>
  <line x1="199" y1="195" x2="199" y2="210" stroke="#d4a832" stroke-width="2" opacity="0.5"/>
  <line x1="205" y1="195" x2="205" y2="208" stroke="#d4a832" stroke-width="2" opacity="0.5"/>

  <!-- Right tapestry -->
  <rect x="690" y="20" width="100" height="180" rx="4" fill="#2a1200" stroke="#5a3000" stroke-width="2"/>
  <rect x="695" y="25" width="90" height="170" fill="#1e0d00"/>
  <text x="740" y="80" text-anchor="middle" font-size="30" fill="#d4a832" opacity="0.7">🤖</text>
  <text x="740" y="120" text-anchor="middle" font-family="serif" font-size="9" fill="#d4a832" opacity="0.6">KI MIT</text>
  <text x="740" y="135" text-anchor="middle" font-family="serif" font-size="9" fill="#d4a832" opacity="0.6">VERANTWORTUNG</text>
  <rect x="695" y="25" width="90" height="170" fill="none" stroke="#5a3000" stroke-width="3"/>
  <rect x="698" y="28" width="84" height="164" fill="none" stroke="#3a1800" stroke-width="1"/>

  <!-- === ORACLE ALTAR (center) === -->
  <!-- Altar base steps -->
  <rect x="325" y="280" width="250" height="16" rx="3" fill="#1e1000" stroke="#3d2000" stroke-width="2"/>
  <rect x="335" y="265" width="230" height="18" rx="3" fill="#231400" stroke="#3d2000" stroke-width="2"/>
  <rect x="345" y="252" width="210" height="16" rx="3" fill="#281800" stroke="#4a2800" stroke-width="2"/>
  <!-- Altar top surface -->
  <rect x="355" y="210" width="190" height="45" rx="4" fill="#2d1800" stroke="#5a3000" stroke-width="2"/>
  <rect x="358" y="213" width="184" height="39" rx="3" fill="#251400"/>
  <!-- Altar decorations -->
  <text x="450" y="245" text-anchor="middle" font-family="serif" font-size="9" fill="#d4a832" opacity="0.5">✦ ORAKEL DER KI-ETHIK ✦</text>

  <!-- === CRYSTAL BALL / ORACLE === -->
  <!-- Glow base -->
  <ellipse cx="450" cy="215" rx="100" ry="30" fill="#FF8C00" opacity="0.08"/>
  <!-- Ball base/stand -->
  <ellipse cx="450" cy="218" rx="30" ry="8" fill="#3d2000" stroke="#5a3000" stroke-width="1"/>
  <!-- Crystal ball -->
  <circle cx="450" cy="165" r="55" fill="url(#crystalBall)" stroke="#8a5020" stroke-width="2"/>
  <!-- Inner glow -->
  <circle cx="450" cy="165" r="45" fill="url(#crystalSheen)" opacity="0.6"/>
  <!-- Inner vision (AI bias visualization) -->
  <circle cx="450" cy="165" r="38" fill="#2a0800" opacity="0.7"/>
  <!-- AI decision tree inside ball -->
  <circle cx="450" cy="145" r="7" fill="#FF8C00" opacity="0.7"/>
  <line x1="443" y1="152" x2="430" y2="168" stroke="#FFE135" stroke-width="1" opacity="0.6"/>
  <line x1="457" y1="152" x2="470" y2="168" stroke="#FFE135" stroke-width="1" opacity="0.6"/>
  <circle cx="430" cy="172" r="5" fill="#00C853" opacity="0.7"/>
  <circle cx="470" cy="172" r="5" fill="#FF3B3F" opacity="0.7"/>
  <text x="430" y="175" text-anchor="middle" font-family="monospace" font-size="5" fill="#00C853">JA</text>
  <text x="470" y="175" text-anchor="middle" font-family="monospace" font-size="5" fill="#FF3B3F">NEIN</text>
  <!-- Crystal sheen highlight -->
  <ellipse cx="432" cy="140" rx="15" ry="10" fill="white" opacity="0.2"/>
  <!-- Oracle ambient glow -->
  <circle cx="450" cy="165" r="65" fill="url(#oracleGlow)" opacity="0.6"/>

  <!-- === WALL TORCHES === -->
  <!-- Left torch -->
  <rect x="240" y="130" width="10" height="40" fill="#3d2000" stroke="#1a0d00" stroke-width="1"/>
  <rect x="232" y="126" width="26" height="10" rx="2" fill="#2d1800" stroke="#1a0d00" stroke-width="1"/>
  <!-- Flame -->
  <ellipse cx="245" cy="118" rx="10" ry="14" fill="url(#flameGrad)" opacity="0.9" filter="url(#fireGlow)"/>
  <ellipse cx="241" cy="115" rx="5" ry="8" fill="#FFE135" opacity="0.7"/>
  <!-- Torch light on wall -->
  <ellipse cx="245" cy="160" rx="60" ry="40" fill="#FF8C00" opacity="0.05"/>

  <!-- Right torch -->
  <rect x="650" y="130" width="10" height="40" fill="#3d2000" stroke="#1a0d00" stroke-width="1"/>
  <rect x="642" y="126" width="26" height="10" rx="2" fill="#2d1800" stroke="#1a0d00" stroke-width="1"/>
  <ellipse cx="655" cy="118" rx="10" ry="14" fill="url(#flameGrad)" opacity="0.9" filter="url(#fireGlow)"/>
  <ellipse cx="651" cy="115" rx="5" ry="8" fill="#FFE135" opacity="0.7"/>
  <ellipse cx="655" cy="160" rx="60" ry="40" fill="#FF8C00" opacity="0.05"/>

  <!-- === SCROLLS / ETHICS DOCUMENTS === -->
  <!-- Left scroll -->
  <rect x="115" y="230" width="90" height="70" rx="3" fill="#d4a832" opacity="0.9"/>
  <rect x="115" y="228" width="90" height="8" rx="3" fill="url(#scrollGrad)"/>
  <rect x="115" y="294" width="90" height="8" rx="3" fill="url(#scrollGrad)"/>
  <rect x="120" y="235" width="80" height="60" fill="#f5e8a0" opacity="0.95"/>
  <!-- Scroll text -->
  <text x="160" y="252" text-anchor="middle" font-family="serif" font-size="8" fill="#5a3000" font-weight="bold">EU AI ACT</text>
  <text x="160" y="264" text-anchor="middle" font-family="serif" font-size="7" fill="#5a3000">Artikel 5:</text>
  <text x="160" y="274" text-anchor="middle" font-family="serif" font-size="7" fill="#5a3000">Verbotene KI-</text>
  <text x="160" y="284" text-anchor="middle" font-family="serif" font-size="7" fill="#5a3000">Praktiken</text>
  <line x1="122" y1="256" x2="198" y2="256" stroke="#8a6a20" stroke-width="0.5" opacity="0.5"/>

  <!-- Right scroll -->
  <rect x="695" y="230" width="90" height="70" rx="3" fill="#d4a832" opacity="0.9"/>
  <rect x="695" y="228" width="90" height="8" rx="3" fill="url(#scrollGrad)"/>
  <rect x="695" y="294" width="90" height="8" rx="3" fill="url(#scrollGrad)"/>
  <rect x="700" y="235" width="80" height="60" fill="#f5e8a0" opacity="0.95"/>
  <text x="740" y="252" text-anchor="middle" font-family="serif" font-size="8" fill="#5a3000" font-weight="bold">DSGVO</text>
  <text x="740" y="264" text-anchor="middle" font-family="serif" font-size="7" fill="#5a3000">Art. 22:</text>
  <text x="740" y="274" text-anchor="middle" font-family="serif" font-size="7" fill="#5a3000">Automatis.</text>
  <text x="740" y="284" text-anchor="middle" font-family="serif" font-size="7" fill="#5a3000">Entscheidung</text>
  <line x1="702" y1="256" x2="778" y2="256" stroke="#8a6a20" stroke-width="0.5" opacity="0.5"/>

  <!-- === BIAS SCALE ON WALL === -->
  <text x="450" y="55" text-anchor="middle" font-family="serif" font-size="30" fill="#d4a832" opacity="0.3" filter="url(#softGlow)">⚖</text>
  <text x="450" y="52" text-anchor="middle" font-family="serif" font-size="9" fill="#d4a832" opacity="0.25">GLEICHHEIT • TRANSPARENZ • VERANTWORTLICHKEIT</text>

  <!-- === STARS (ceiling stars through open roof) === -->
  <circle cx="450" cy="10" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="380" cy="20" r="1" fill="white" opacity="0.4"/>
  <circle cx="520" cy="15" r="1" fill="white" opacity="0.5"/>
  <circle cx="300" cy="8" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="600" cy="12" r="1" fill="white" opacity="0.4"/>
  <circle cx="200" cy="15" r="1" fill="white" opacity="0.3"/>
  <circle cx="700" cy="8" r="1.5" fill="white" opacity="0.35"/>

  <!-- Ambient oracle light on floor -->
  <ellipse cx="450" cy="390" rx="180" ry="40" fill="#FF8C00" opacity="0.04"/>

  <!-- Corner shadows -->
  <polygon points="0,0 120,0 0,200" fill="#000" opacity="0.6"/>
  <polygon points="900,0 780,0 900,200" fill="#000" opacity="0.5"/>
  <polygon points="0,500 120,500 0,360" fill="#000" opacity="0.5"/>
  <polygon points="900,500 780,500 900,360" fill="#000" opacity="0.5"/>

  <!-- Floor reflection of oracle -->
  <ellipse cx="450" cy="355" rx="40" ry="8" fill="#FF8C00" opacity="0.1"/>
</svg>
