<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <pattern id="darkWall" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="#1a0a1e"/>
      <rect x="0" y="0" width="60" height="1" fill="#120816" opacity="0.6"/>
      <rect x="0" y="30" width="60" height="1" fill="#120816" opacity="0.6"/>
    </pattern>
    <pattern id="darkFloor" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="#100818"/>
      <rect x="0" y="0" width="80" height="80" fill="none" stroke="#180d20" stroke-width="1"/>
    </pattern>
    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9C27B0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9C27B0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF3B3F" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF3B3F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screenPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a0a35" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#1a0525" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="deskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#25152e"/>
      <stop offset="100%" stop-color="#150a1e"/>
    </linearGradient>
    <filter id="purpleGlowFilter">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- === WALL & FLOOR === -->
  <rect width="900" height="330" fill="url(#darkWall)"/>
  <rect y="330" width="900" height="170" fill="url(#darkFloor)"/>
  <!-- Baseboard -->
  <rect y="328" width="900" height="4" fill="#9C27B0" opacity="0.15"/>

  <!-- === MAIN CHART DISPLAY (center) === -->
  <rect x="200" y="15" width="500" height="280" rx="6" fill="#0a0510" stroke="#9C27B0" stroke-width="2.5"/>
  <rect x="204" y="19" width="492" height="272" rx="4" fill="#080310"/>
  <!-- Chart title -->
  <text x="450" y="40" text-anchor="middle" font-family="monospace" font-size="11" fill="#9C27B0" filter="url(#purpleGlowFilter)">OVERFITTING ANALYSE — MODELL v7.3</text>

  <!-- Chart axes -->
  <line x1="240" y1="65" x2="240" y2="255" stroke="#9C27B0" stroke-width="1.5" opacity="0.6"/>
  <line x1="240" y1="255" x2="660" y2="255" stroke="#9C27B0" stroke-width="1.5" opacity="0.6"/>
  <!-- Axis labels -->
  <text x="450" y="272" text-anchor="middle" font-family="monospace" font-size="8" fill="#9C27B0" opacity="0.5">MODELLKOMPLEXITÄT →</text>
  <text x="225" y="160" text-anchor="middle" font-family="monospace" font-size="8" fill="#9C27B0" opacity="0.5" transform="rotate(-90,225,160)">FEHLERRATE ↑</text>

  <!-- Grid lines -->
  <line x1="240" y1="255" x2="660" y2="255" stroke="#9C27B0" stroke-width="0.5" opacity="0.2"/>
  <line x1="240" y1="210" x2="660" y2="210" stroke="#9C27B0" stroke-width="0.5" opacity="0.15"/>
  <line x1="240" y1="165" x2="660" y2="165" stroke="#9C27B0" stroke-width="0.5" opacity="0.15"/>
  <line x1="240" y1="120" x2="660" y2="120" stroke="#9C27B0" stroke-width="0.5" opacity="0.15"/>
  <line x1="240" y1="75" x2="660" y2="75" stroke="#9C27B0" stroke-width="0.5" opacity="0.1"/>
  <!-- Vertical grid -->
  <line x1="324" y1="65" x2="324" y2="255" stroke="#9C27B0" stroke-width="0.5" opacity="0.1"/>
  <line x1="408" y1="65" x2="408" y2="255" stroke="#9C27B0" stroke-width="0.5" opacity="0.1"/>
  <line x1="492" y1="65" x2="492" y2="255" stroke="#9C27B0" stroke-width="0.5" opacity="0.1"/>
  <line x1="576" y1="65" x2="576" y2="255" stroke="#9C27B0" stroke-width="0.5" opacity="0.1"/>
  <line x1="660" y1="65" x2="660" y2="255" stroke="#9C27B0" stroke-width="0.5" opacity="0.1"/>

  <!-- Training error curve (goes down = overfitting) -->
  <polyline points="240,220 295,190 350,165 405,140 460,115 515,95 570,78 625,68 660,63"
    fill="none" stroke="#00C853" stroke-width="2.5" opacity="0.9"/>
  <!-- Validation/test error curve (goes down then up = overfitting) -->
  <polyline points="240,225 295,195 350,172 405,155 460,148 515,158 570,178 625,205 660,230"
    fill="none" stroke="#FF3B3F" stroke-width="2.5" opacity="0.9"/>
  <!-- Optimal point marker -->
  <circle cx="460" cy="148" r="6" fill="#FFE135" opacity="0.9" filter="url(#purpleGlowFilter)"/>
  <line x1="460" y1="65" x2="460" y2="255" stroke="#FFE135" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="464" y="80" font-family="monospace" font-size="7" fill="#FFE135" opacity="0.8">OPTIMUM</text>

  <!-- OVERFITTING zone highlight -->
  <rect x="460" y="65" width="200" height="190" fill="#FF3B3F" opacity="0.04"/>
  <text x="560" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#FF3B3F" opacity="0.6">OVERFITTING</text>
  <text x="350" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#00C853" opacity="0.6">GUT</text>

  <!-- Legend -->
  <line x1="250" y1="280" x2="275" y2="280" stroke="#00C853" stroke-width="2"/>
  <text x="280" y="283" font-family="monospace" font-size="8" fill="#00C853" opacity="0.7">Training</text>
  <line x1="340" y1="280" x2="365" y2="280" stroke="#FF3B3F" stroke-width="2"/>
  <text x="370" y="283" font-family="monospace" font-size="8" fill="#FF3B3F" opacity="0.7">Validierung</text>
  <circle cx="455" cy="280" r="4" fill="#FFE135" opacity="0.7"/>
  <text x="464" y="283" font-family="monospace" font-size="8" fill="#FFE135" opacity="0.7">Optimaler Punkt</text>

  <!-- Purple screen glow -->
  <rect x="200" y="15" width="500" height="280" rx="6" fill="url(#purpleGlow)" opacity="0.2"/>

  <!-- === SIDE PANEL LEFT — Model stats === -->
  <rect x="20" y="20" width="165" height="295" rx="4" fill="#0a0510" stroke="#9C27B0" stroke-width="1.5" opacity="0.8"/>
  <text x="102" y="42" text-anchor="middle" font-family="monospace" font-size="9" fill="#9C27B0" opacity="0.8">MODELL-STATUS</text>
  <line x1="30" y1="48" x2="175" y2="48" stroke="#9C27B0" stroke-width="0.5" opacity="0.4"/>
  <!-- Stats -->
  <text x="30" y="65" font-family="monospace" font-size="8" fill="#aaa" opacity="0.7">Training-Acc:</text>
  <text x="165" y="65" text-anchor="end" font-family="monospace" font-size="8" fill="#00C853" filter="url(#purpleGlowFilter)">99.8%</text>
  <text x="30" y="80" font-family="monospace" font-size="8" fill="#aaa" opacity="0.7">Test-Acc:</text>
  <text x="165" y="80" text-anchor="end" font-family="monospace" font-size="8" fill="#FF3B3F" filter="url(#purpleGlowFilter)">61.2%</text>
  <text x="30" y="95" font-family="monospace" font-size="8" fill="#aaa" opacity="0.7">Tiefe:</text>
  <text x="165" y="95" text-anchor="end" font-family="monospace" font-size="8" fill="#FFE135">47 Knoten</text>
  <text x="30" y="110" font-family="monospace" font-size="8" fill="#aaa" opacity="0.7">Baumtiefe:</text>
  <text x="165" y="110" text-anchor="end" font-family="monospace" font-size="8" fill="#FFE135">12</text>
  <text x="30" y="125" font-family="monospace" font-size="8" fill="#aaa" opacity="0.7">Status:</text>
  <text x="165" y="125" text-anchor="end" font-family="monospace" font-size="8" fill="#FF3B3F">OVERFIT ⚠</text>
  <line x1="30" y1="133" x2="175" y2="133" stroke="#9C27B0" stroke-width="0.5" opacity="0.3"/>
  <!-- Progress bars -->
  <text x="30" y="148" font-family="monospace" font-size="7" fill="#666">Training:</text>
  <rect x="80" y="140" width="80" height="10" rx="2" fill="#1a0a20"/>
  <rect x="80" y="140" width="79" height="10" rx="2" fill="#00C853" opacity="0.6"/>
  <text x="30" y="168" font-family="monospace" font-size="7" fill="#666">Test:</text>
  <rect x="80" y="160" width="80" height="10" rx="2" fill="#1a0a20"/>
  <rect x="80" y="160" width="49" height="10" rx="2" fill="#FF3B3F" opacity="0.6"/>
  <!-- Warning box -->
  <rect x="27" y="185" width="133" height="60" rx="3" fill="#2a0505" stroke="#FF3B3F" stroke-width="1" opacity="0.8"/>
  <text x="93" y="200" text-anchor="middle" font-family="monospace" font-size="8" fill="#FF3B3F">⚠ WARNUNG</text>
  <text x="93" y="215" text-anchor="middle" font-family="monospace" font-size="7" fill="#FF3B3F" opacity="0.8">Modell auswendig</text>
  <text x="93" y="227" text-anchor="middle" font-family="monospace" font-size="7" fill="#FF3B3F" opacity="0.8">gelernt! Pruning</text>
  <text x="93" y="239" text-anchor="middle" font-family="monospace" font-size="7" fill="#FF3B3F" opacity="0.8">empfohlen.</text>
  <!-- Model versions -->
  <text x="30" y="265" font-family="monospace" font-size="7" fill="#666">v7.1: acc=88.1%</text>
  <text x="30" y="278" font-family="monospace" font-size="7" fill="#9C27B0">v7.2: acc=75.3%</text>
  <text x="30" y="291" font-family="monospace" font-size="7" fill="#FF3B3F">v7.3: acc=61.2% ←</text>
  <text x="30" y="305" font-family="monospace" font-size="7" fill="#666">v7.4: pruning...</text>

  <!-- === SIDE PANEL RIGHT — confusion matrix === -->
  <rect x="715" y="20" width="170" height="295" rx="4" fill="#0a0510" stroke="#9C27B0" stroke-width="1.5" opacity="0.8"/>
  <text x="800" y="42" text-anchor="middle" font-family="monospace" font-size="9" fill="#9C27B0" opacity="0.8">KONFUSIONSMATRIX</text>
  <line x1="725" y1="48" x2="875" y2="48" stroke="#9C27B0" stroke-width="0.5" opacity="0.4"/>
  <!-- Matrix grid -->
  <text x="780" y="68" text-anchor="middle" font-family="monospace" font-size="7" fill="#666">Pred A</text>
  <text x="840" y="68" text-anchor="middle" font-family="monospace" font-size="7" fill="#666">Pred B</text>
  <text x="738" y="92" text-anchor="end" font-family="monospace" font-size="7" fill="#666">True A</text>
  <text x="738" y="125" text-anchor="end" font-family="monospace" font-size="7" fill="#666">True B</text>
  <!-- Matrix cells -->
  <rect x="745" y="74" width="68" height="36" rx="2" fill="#00C853" opacity="0.25" stroke="#00C853" stroke-width="0.5"/>
  <text x="779" y="97" text-anchor="middle" font-family="monospace" font-size="13" fill="#00C853" font-weight="bold">847</text>
  <rect x="815" y="74" width="55" height="36" rx="2" fill="#FF3B3F" opacity="0.25" stroke="#FF3B3F" stroke-width="0.5"/>
  <text x="842" y="97" text-anchor="middle" font-family="monospace" font-size="13" fill="#FF3B3F" font-weight="bold">12</text>
  <rect x="745" y="112" width="68" height="36" rx="2" fill="#FF3B3F" opacity="0.25" stroke="#FF3B3F" stroke-width="0.5"/>
  <text x="779" y="135" text-anchor="middle" font-family="monospace" font-size="13" fill="#FF3B3F" font-weight="bold">301</text>
  <rect x="815" y="112" width="55" height="36" rx="2" fill="#00C853" opacity="0.25" stroke="#00C853" stroke-width="0.5"/>
  <text x="842" y="135" text-anchor="middle" font-family="monospace" font-size="13" fill="#00C853" font-weight="bold">203</text>
  <!-- Labels -->
  <text x="800" y="162" text-anchor="middle" font-family="monospace" font-size="7" fill="#00C853" opacity="0.6">TP+TN: 1050 ✓</text>
  <text x="800" y="174" text-anchor="middle" font-family="monospace" font-size="7" fill="#FF3B3F" opacity="0.6">FP+FN: 313 ✗</text>
  <line x1="725" y1="182" x2="875" y2="182" stroke="#9C27B0" stroke-width="0.5" opacity="0.3"/>
  <!-- Precision/Recall -->
  <text x="725" y="197" font-family="monospace" font-size="7" fill="#aaa" opacity="0.7">Präzision:</text>
  <text x="875" y="197" text-anchor="end" font-family="monospace" font-size="7" fill="#FFE135">98.6%</text>
  <text x="725" y="212" font-family="monospace" font-size="7" fill="#aaa" opacity="0.7">Recall:</text>
  <text x="875" y="212" text-anchor="end" font-family="monospace" font-size="7" fill="#FF3B3F">40.3%</text>
  <text x="725" y="227" font-family="monospace" font-size="7" fill="#aaa" opacity="0.7">F1-Score:</text>
  <text x="875" y="227" text-anchor="end" font-family="monospace" font-size="7" fill="#FF3B3F">57.1%</text>
  <line x1="725" y1="235" x2="875" y2="235" stroke="#9C27B0" stroke-width="0.5" opacity="0.3"/>
  <text x="800" y="252" text-anchor="middle" font-family="monospace" font-size="7" fill="#9C27B0" opacity="0.6">Diagnose: Overfitting</text>
  <text x="800" y="265" text-anchor="middle" font-family="monospace" font-size="7" fill="#9C27B0" opacity="0.6">Lösung: Max-Depth=5</text>
  <text x="800" y="278" text-anchor="middle" font-family="monospace" font-size="7" fill="#9C27B0" opacity="0.6">oder Min-Samples=20</text>

  <!-- === DESK === -->
  <ellipse cx="450" cy="338" rx="320" ry="12" fill="#000" opacity="0.5"/>
  <rect x="130" y="310" width="640" height="18" rx="3" fill="url(#deskGrad)" stroke="#2a1535" stroke-width="2"/>
  <rect x="132" y="310" width="636" height="3" rx="1" fill="#9C27B0" opacity="0.15"/>
  <!-- Legs -->
  <rect x="150" y="328" width="12" height="40" fill="#150a1e"/>
  <rect x="738" y="328" width="12" height="40" fill="#150a1e"/>

  <!-- Desk items: laptop -->
  <rect x="370" y="282" width="160" height="28" rx="4" fill="#150a20" stroke="#9C27B0" stroke-width="1" opacity="0.9"/>
  <rect x="374" y="285" width="152" height="22" rx="2" fill="#0a0510"/>
  <text x="450" y="300" text-anchor="middle" font-family="monospace" font-size="7" fill="#9C27B0" opacity="0.8">python train.py --max-depth 5</text>
  <!-- Keyboard -->
  <rect x="390" y="305" width="120" height="8" rx="2" fill="#150a20" stroke="#2a1535" stroke-width="1"/>
  <!-- Post-it notes -->
  <rect x="280" y="278" width="55" height="40" rx="2" fill="#FFE135" opacity="0.85" transform="rotate(-5,307,298)"/>
  <text x="292" y="293" font-family="monospace" font-size="7" fill="#333" transform="rotate(-5,307,298)">Pruning:</text>
  <text x="292" y="304" font-family="monospace" font-size="7" fill="#333" transform="rotate(-5,307,298)">max_depth</text>
  <text x="292" y="315" font-family="monospace" font-size="7" fill="#333" transform="rotate(-5,307,298)">=5 !</text>
  <!-- Coffee -->
  <rect x="578" y="278" width="25" height="28" rx="3" fill="#1a0a20" stroke="#2a1535" stroke-width="1"/>
  <path d="M 603 286 Q 612 286 612 293 Q 612 300 603 300" fill="none" stroke="#2a1535" stroke-width="2"/>
  <text x="590" y="297" text-anchor="middle" font-family="monospace" font-size="7" fill="#9C27B0" opacity="0.5">☕</text>

  <!-- Ambient glow from screens -->
  <rect x="200" y="15" width="500" height="290" fill="url(#purpleGlow)" opacity="0.1"/>

  <!-- Corner shadows -->
  <polygon points="0,0 100,0 0,180" fill="#000" opacity="0.5"/>
  <polygon points="900,0 800,0 900,180" fill="#000" opacity="0.4"/>
  <polygon points="0,500 100,500 0,360" fill="#000" opacity="0.5"/>
  <polygon points="900,500 800,500 900,360" fill="#000" opacity="0.5"/>

  <!-- Floating error indicators -->
  <circle cx="160" cy="200" r="2" fill="#FF3B3F" opacity="0.5" filter="url(#purpleGlowFilter)"/>
  <circle cx="700" cy="220" r="1.5" fill="#9C27B0" opacity="0.6" filter="url(#purpleGlowFilter)"/>
</svg>
