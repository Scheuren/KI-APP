<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <!-- Lab wall -->
    <pattern id="labWall" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="#0d1b2a"/>
      <rect x="0" y="0" width="80" height="1" fill="#0a1520" opacity="0.8"/>
      <rect x="0" y="40" width="80" height="1" fill="#0a1520" opacity="0.8"/>
      <rect x="0" y="0" width="1" height="80" fill="#0a1520" opacity="0.5"/>
      <rect x="40" y="0" width="1" height="80" fill="#0a1520" opacity="0.5"/>
    </pattern>
    <!-- Floor -->
    <pattern id="labFloor" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="#091520"/>
      <rect x="0" y="0" width="60" height="60" fill="none" stroke="#0d2030" stroke-width="1"/>
      <line x1="0" y1="0" x2="60" y2="60" stroke="#0a1a28" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <!-- Neon green glow -->
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00C853" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00C853" stop-opacity="0"/>
    </radialGradient>
    <!-- Blue screen glow -->
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0066FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0066FF" stop-opacity="0"/>
    </radialGradient>
    <!-- Overhead light -->
    <linearGradient id="stripLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#aaffcc" stop-opacity="0"/>
      <stop offset="30%" stop-color="#aaffcc" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#aaffcc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#aaffcc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="labTableGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#0d1a25"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1e2a"/>
      <stop offset="50%" stop-color="#152535"/>
      <stop offset="100%" stop-color="#0d1e2a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="900" height="340" fill="url(#labWall)"/>
  <rect y="340" width="900" height="160" fill="url(#labFloor)"/>

  <!-- === CEILING STRIP LIGHTS === -->
  <rect x="100" y="0" width="300" height="8" rx="4" fill="url(#stripLight)"/>
  <rect x="500" y="0" width="300" height="8" rx="4" fill="url(#stripLight)"/>
  <!-- Light glow on ceiling -->
  <rect x="100" y="0" width="300" height="40" fill="#aaffcc" opacity="0.03"/>
  <rect x="500" y="0" width="300" height="40" fill="#aaffcc" opacity="0.03"/>

  <!-- === SERVER RACK (left) === -->
  <rect x="20" y="30" width="120" height="290" rx="4" fill="url(#serverGrad)" stroke="#0066FF" stroke-width="2" opacity="0.9"/>
  <!-- Server units -->
  <rect x="28" y="40" width="104" height="18" rx="2" fill="#0d1e2a" stroke="#0066FF" stroke-width="1" opacity="0.7"/>
  <rect x="28" y="63" width="104" height="18" rx="2" fill="#0d1e2a" stroke="#00C853" stroke-width="1" opacity="0.7"/>
  <rect x="28" y="86" width="104" height="18" rx="2" fill="#0d1e2a" stroke="#0066FF" stroke-width="1" opacity="0.7"/>
  <rect x="28" y="109" width="104" height="18" rx="2" fill="#0d1e2a" stroke="#FF3B3F" stroke-width="1" opacity="0.7"/>
  <rect x="28" y="132" width="104" height="18" rx="2" fill="#0d1e2a" stroke="#0066FF" stroke-width="1" opacity="0.7"/>
  <rect x="28" y="155" width="104" height="18" rx="2" fill="#0d1e2a" stroke="#00C853" stroke-width="1" opacity="0.7"/>
  <rect x="28" y="178" width="104" height="18" rx="2" fill="#0d1e2a" stroke="#0066FF" stroke-width="1" opacity="0.7"/>
  <rect x="28" y="201" width="104" height="18" rx="2" fill="#0d1e2a" stroke="#FFE135" stroke-width="1" opacity="0.7"/>
  <rect x="28" y="224" width="104" height="18" rx="2" fill="#0d1e2a" stroke="#0066FF" stroke-width="1" opacity="0.7"/>
  <rect x="28" y="247" width="104" height="18" rx="2" fill="#0d1e2a" stroke="#00C853" stroke-width="1" opacity="0.7"/>
  <rect x="28" y="270" width="104" height="18" rx="2" fill="#0d1e2a" stroke="#0066FF" stroke-width="1" opacity="0.7"/>
  <rect x="28" y="293" width="104" height="18" rx="2" fill="#0d1e2a" stroke="#FF3B3F" stroke-width="1" opacity="0.7"/>
  <!-- Server LEDs -->
  <circle cx="118" cy="49" r="3" fill="#00C853" filter="url(#glow)"/>
  <circle cx="118" cy="72" r="3" fill="#00C853" filter="url(#glow)"/>
  <circle cx="118" cy="95" r="3" fill="#0066FF" filter="url(#glow)"/>
  <circle cx="118" cy="118" r="3" fill="#FF3B3F" filter="url(#glow)"/>
  <circle cx="118" cy="141" r="3" fill="#00C853" filter="url(#glow)"/>
  <circle cx="118" cy="164" r="3" fill="#00C853" filter="url(#glow)"/>
  <circle cx="118" cy="187" r="3" fill="#0066FF" filter="url(#glow)"/>
  <circle cx="118" cy="210" r="3" fill="#FFE135" filter="url(#glow)"/>
  <circle cx="118" cy="233" r="3" fill="#00C853" filter="url(#glow)"/>
  <circle cx="118" cy="256" r="3" fill="#00C853" filter="url(#glow)"/>
  <circle cx="118" cy="279" r="3" fill="#0066FF" filter="url(#glow)"/>
  <circle cx="118" cy="302" r="3" fill="#FF3B3F" filter="url(#glow)"/>
  <!-- Server glow -->
  <rect x="20" y="30" width="120" height="290" rx="4" fill="url(#blueGlow)" opacity="0.2"/>

  <!-- === MAIN MONITOR WALL (center) === -->
  <!-- Large display -->
  <rect x="220" y="20" width="460" height="240" rx="6" fill="#050d14" stroke="#00C853" stroke-width="3"/>
  <rect x="224" y="24" width="452" height="232" rx="4" fill="#030a10"/>
  <!-- Decision Tree Visualization on screen -->
  <!-- Root node -->
  <circle cx="450" cy="60" r="22" fill="#00C853" opacity="0.2" stroke="#00C853" stroke-width="2" filter="url(#glow)"/>
  <text x="450" y="58" text-anchor="middle" font-family="monospace" font-size="9" fill="#00C853">Merkmal</text>
  <text x="450" y="70" text-anchor="middle" font-family="monospace" font-size="9" fill="#00C853">A ≥ 5?</text>
  <!-- Branch lines -->
  <line x1="432" y1="80" x2="360" y2="120" stroke="#00C853" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.7"/>
  <line x1="468" y1="80" x2="540" y2="120" stroke="#00C853" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.7"/>
  <!-- Branch labels -->
  <text x="388" y="108" font-family="monospace" font-size="8" fill="#FFE135" opacity="0.8">JA</text>
  <text x="512" y="108" font-family="monospace" font-size="8" fill="#FFE135" opacity="0.8">NEIN</text>
  <!-- Level 2 nodes -->
  <circle cx="360" cy="135" r="18" fill="#0066FF" opacity="0.2" stroke="#0066FF" stroke-width="1.5" filter="url(#glow)"/>
  <text x="360" y="133" text-anchor="middle" font-family="monospace" font-size="8" fill="#0066FF">B &gt;</text>
  <text x="360" y="143" text-anchor="middle" font-family="monospace" font-size="8" fill="#0066FF">3?</text>
  <circle cx="540" cy="135" r="18" fill="#0066FF" opacity="0.2" stroke="#0066FF" stroke-width="1.5" filter="url(#glow)"/>
  <text x="540" y="133" text-anchor="middle" font-family="monospace" font-size="8" fill="#0066FF">C =</text>
  <text x="540" y="143" text-anchor="middle" font-family="monospace" font-size="8" fill="#0066FF">rot?</text>
  <!-- More branches -->
  <line x1="346" y1="151" x2="310" y2="185" stroke="#00C853" stroke-width="1" opacity="0.5"/>
  <line x1="374" y1="151" x2="410" y2="185" stroke="#00C853" stroke-width="1" opacity="0.5"/>
  <line x1="526" y1="151" x2="490" y2="185" stroke="#00C853" stroke-width="1" opacity="0.5"/>
  <line x1="554" y1="151" x2="590" y2="185" stroke="#00C853" stroke-width="1" opacity="0.5"/>
  <!-- Leaf nodes -->
  <rect x="293" y="183" width="34" height="18" rx="3" fill="#00C853" opacity="0.3" stroke="#00C853" stroke-width="1"/>
  <text x="310" y="196" text-anchor="middle" font-family="monospace" font-size="8" fill="#00C853">Klasse A</text>
  <rect x="393" y="183" width="34" height="18" rx="3" fill="#FF3B3F" opacity="0.3" stroke="#FF3B3F" stroke-width="1"/>
  <text x="410" y="196" text-anchor="middle" font-family="monospace" font-size="8" fill="#FF3B3F">Klasse B</text>
  <rect x="473" y="183" width="34" height="18" rx="3" fill="#FF3B3F" opacity="0.3" stroke="#FF3B3F" stroke-width="1"/>
  <text x="490" y="196" text-anchor="middle" font-family="monospace" font-size="8" fill="#FF3B3F">Klasse B</text>
  <rect x="573" y="183" width="34" height="18" rx="3" fill="#00C853" opacity="0.3" stroke="#00C853" stroke-width="1"/>
  <text x="590" y="196" text-anchor="middle" font-family="monospace" font-size="8" fill="#00C853">Klasse A</text>
  <!-- Data stream at bottom of screen -->
  <text x="234" y="220" font-family="monospace" font-size="7" fill="#00C853" opacity="0.6">Trainingsdaten: 847 Datensätze geladen ████████████ 100%</text>
  <text x="234" y="232" font-family="monospace" font-size="7" fill="#FFE135" opacity="0.6">Genauigkeit: 94.3% | Gini-Index: 0.12 | Tiefe: 4</text>
  <text x="234" y="244" font-family="monospace" font-size="7" fill="#00C853" opacity="0.4">Model TEAM-MKS-v3 bereit. Warte auf Eingabe_</text>
  <!-- Screen glow -->
  <rect x="220" y="20" width="460" height="240" rx="6" fill="url(#screenGlow)" opacity="0.15"/>
  <!-- Monitor stand -->
  <rect x="425" y="260" width="50" height="15" rx="2" fill="#0d1e2a" stroke="#1a3a4a" stroke-width="1"/>
  <rect x="400" y="273" width="100" height="8" rx="2" fill="#0d1e2a" stroke="#1a3a4a" stroke-width="1"/>

  <!-- === LAB WORKBENCH === -->
  <!-- Table shadow -->
  <ellipse cx="450" cy="345" rx="280" ry="10" fill="#000" opacity="0.4"/>
  <!-- Table surface -->
  <rect x="170" y="300" width="560" height="18" rx="3" fill="url(#labTableGrad)" stroke="#1a3a4a" stroke-width="2"/>
  <!-- Table edge glow -->
  <rect x="172" y="300" width="556" height="3" rx="2" fill="#00C853" opacity="0.2"/>
  <!-- Table legs -->
  <rect x="190" y="318" width="14" height="45" fill="#0d1a25"/>
  <rect x="696" y="318" width="14" height="45" fill="#0d1a25"/>

  <!-- Lab items on table -->
  <!-- Keyboard -->
  <rect x="270" y="284" width="120" height="16" rx="3" fill="#0d1525" stroke="#1a2a3a" stroke-width="1"/>
  <rect x="274" y="287" width="8" height="7" rx="1" fill="#1a2a3a"/>
  <rect x="285" y="287" width="8" height="7" rx="1" fill="#1a2a3a"/>
  <rect x="296" y="287" width="8" height="7" rx="1" fill="#1a2a3a"/>
  <rect x="307" y="287" width="8" height="7" rx="1" fill="#00C853" opacity="0.5"/>
  <rect x="318" y="287" width="8" height="7" rx="1" fill="#1a2a3a"/>
  <rect x="329" y="287" width="8" height="7" rx="1" fill="#1a2a3a"/>
  <rect x="340" y="287" width="8" height="7" rx="1" fill="#1a2a3a"/>
  <rect x="351" y="287" width="8" height="7" rx="1" fill="#0066FF" opacity="0.5"/>
  <rect x="362" y="287" width="22" height="7" rx="1" fill="#1a2a3a"/>
  <!-- Coffee mug -->
  <rect x="530" y="276" width="28" height="30" rx="3" fill="#1a2a3a" stroke="#2a3a4a" stroke-width="1"/>
  <path d="M 558 284 Q 570 284 570 292 Q 570 300 558 300" fill="none" stroke="#2a3a4a" stroke-width="2"/>
  <rect x="534" y="278" width="20" height="10" rx="1" fill="#00C853" opacity="0.3"/>
  <!-- Steam -->
  <path d="M 538 272 Q 542 265 538 258" fill="none" stroke="#aaa" stroke-width="1" opacity="0.4"/>
  <path d="M 546 270 Q 550 263 546 256" fill="none" stroke="#aaa" stroke-width="1" opacity="0.4"/>
  <!-- Tablet/notepad -->
  <rect x="580" y="275" width="55" height="28" rx="3" fill="#0d1525" stroke="#00C853" stroke-width="1" opacity="0.8"/>
  <text x="607" y="288" text-anchor="middle" font-family="monospace" font-size="7" fill="#00C853" opacity="0.7">GINI=0.12</text>
  <text x="607" y="298" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFE135" opacity="0.7">ACC=94.3%</text>

  <!-- === NEURAL NETWORK VISUALIZATION (right wall) === -->
  <rect x="760" y="30" width="130" height="220" rx="4" fill="#050d14" stroke="#0066FF" stroke-width="2" opacity="0.8"/>
  <text x="825" y="50" text-anchor="middle" font-family="monospace" font-size="8" fill="#0066FF" opacity="0.7">NEURONALES NETZ</text>
  <!-- Input layer -->
  <circle cx="785" cy="80" r="7" fill="#0066FF" opacity="0.4" stroke="#0066FF" stroke-width="1"/>
  <circle cx="785" cy="105" r="7" fill="#0066FF" opacity="0.4" stroke="#0066FF" stroke-width="1"/>
  <circle cx="785" cy="130" r="7" fill="#0066FF" opacity="0.4" stroke="#0066FF" stroke-width="1"/>
  <circle cx="785" cy="155" r="7" fill="#0066FF" opacity="0.4" stroke="#0066FF" stroke-width="1"/>
  <!-- Hidden layer 1 -->
  <circle cx="820" cy="90" r="7" fill="#00C853" opacity="0.4" stroke="#00C853" stroke-width="1"/>
  <circle cx="820" cy="115" r="7" fill="#00C853" opacity="0.4" stroke="#00C853" stroke-width="1"/>
  <circle cx="820" cy="140" r="7" fill="#00C853" opacity="0.4" stroke="#00C853" stroke-width="1"/>
  <!-- Hidden layer 2 -->
  <circle cx="855" cy="105" r="7" fill="#FFE135" opacity="0.4" stroke="#FFE135" stroke-width="1"/>
  <circle cx="855" cy="130" r="7" fill="#FFE135" opacity="0.4" stroke="#FFE135" stroke-width="1"/>
  <!-- Output -->
  <circle cx="875" cy="117" r="8" fill="#FF3B3F" opacity="0.5" stroke="#FF3B3F" stroke-width="1.5"/>
  <!-- Connections -->
  <line x1="792" y1="80" x2="813" y2="90" stroke="#0066FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="792" y1="80" x2="813" y2="115" stroke="#0066FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="792" y1="80" x2="813" y2="140" stroke="#0066FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="792" y1="105" x2="813" y2="90" stroke="#0066FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="792" y1="105" x2="813" y2="115" stroke="#0066FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="792" y1="105" x2="813" y2="140" stroke="#0066FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="792" y1="130" x2="813" y2="90" stroke="#0066FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="792" y1="130" x2="813" y2="115" stroke="#0066FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="792" y1="130" x2="813" y2="140" stroke="#0066FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="792" y1="155" x2="813" y2="90" stroke="#0066FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="792" y1="155" x2="813" y2="115" stroke="#0066FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="792" y1="155" x2="813" y2="140" stroke="#0066FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="827" y1="90" x2="848" y2="105" stroke="#00C853" stroke-width="0.5" opacity="0.3"/>
  <line x1="827" y1="90" x2="848" y2="130" stroke="#00C853" stroke-width="0.5" opacity="0.3"/>
  <line x1="827" y1="115" x2="848" y2="105" stroke="#00C853" stroke-width="0.5" opacity="0.3"/>
  <line x1="827" y1="115" x2="848" y2="130" stroke="#00C853" stroke-width="0.5" opacity="0.3"/>
  <line x1="827" y1="140" x2="848" y2="105" stroke="#00C853" stroke-width="0.5" opacity="0.3"/>
  <line x1="827" y1="140" x2="848" y2="130" stroke="#00C853" stroke-width="0.5" opacity="0.3"/>
  <line x1="862" y1="105" x2="867" y2="117" stroke="#FFE135" stroke-width="0.5" opacity="0.4"/>
  <line x1="862" y1="130" x2="867" y2="117" stroke="#FFE135" stroke-width="0.5" opacity="0.4"/>
  <!-- Terminal below -->
  <rect x="765" y="175" width="120" height="65" rx="3" fill="#030a10"/>
  <text x="775" y="190" font-family="monospace" font-size="7" fill="#00C853" opacity="0.8">$ train --epochs 100</text>
  <text x="775" y="202" font-family="monospace" font-size="7" fill="#00C853" opacity="0.6">Epoch 47/100...</text>
  <text x="775" y="214" font-family="monospace" font-size="7" fill="#FFE135" opacity="0.6">loss: 0.043</text>
  <text x="775" y="226" font-family="monospace" font-size="7" fill="#00C853" opacity="0.8">acc: 94.3% ▋</text>

  <!-- Corner darkness -->
  <polygon points="0,0 100,0 0,150" fill="#000" opacity="0.5"/>
  <polygon points="900,0 800,0 900,150" fill="#000" opacity="0.3"/>
  <polygon points="0,500 100,500 0,380" fill="#000" opacity="0.5"/>
  <polygon points="900,500 800,500 900,380" fill="#000" opacity="0.4"/>

  <!-- Floating data particles -->
  <circle cx="200" cy="180" r="2" fill="#00C853" opacity="0.4" filter="url(#glow)"/>
  <circle cx="650" cy="150" r="1.5" fill="#0066FF" opacity="0.5" filter="url(#glow)"/>
  <circle cx="350" cy="270" r="1.5" fill="#00C853" opacity="0.3"/>
  <circle cx="700" cy="270" r="2" fill="#FFE135" opacity="0.3"/>
</svg>
